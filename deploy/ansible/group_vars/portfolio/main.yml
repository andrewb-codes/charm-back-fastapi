app_dir: /opt/apps/charm

api_image: ghcr.io/andrewb-codes/charm-back-fastapi-api
frontend_image: ghcr.io/andrewb-codes/charm-back-fastapi-frontend
app_image_tag: main

api_image_ref: "{{ api_image }}:{{ app_image_tag }}"
frontend_image_ref: "{{ frontend_image }}:{{ app_image_tag }}"

postgres_image: mirror.gcr.io/library/postgres:17
redis_image: mirror.gcr.io/library/redis:7.4-alpine

docker_public_network: web
frontend_network_alias: charm-frontend

app_env:
  DATABASE_URL: postgresql+asyncpg://charm_user:{{ postgres_password | urlencode }}@postgres:5432/charm
  JWT_SECRET: "{{ jwt_secret }}"

  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REDIS_URL: async+redis://redis:6379/0
  RATE_LIMIT_KEY_SECRET: "{{ rate_limit_key_secret }}"

  POSTGRES_DB: charm
  POSTGRES_USER: charm_user
  POSTGRES_PASSWORD: "{{ postgres_password }}"

  BOOTSTRAP_ADMIN_ENABLED: "true"
  BOOTSTRAP_ADMIN_EMAIL: admin@example.com
  BOOTSTRAP_ADMIN_PASSWORD: "{{ bootstrap_admin_password }}"

  DEMO_USER_ENABLED: "true"
  DEMO_EMAIL: demo@example.com
  DEMO_PASSWORD: "{{ demo_password }}"

  SYNTHETIC_USERS_ENABLED: "true"
  SYNTHETIC_USERS_COUNT: "100"
  SYNTHETIC_USERS_EMAIL_PREFIX: synthetic
  SYNTHETIC_USERS_PASSWORD: "{{ synthetic_users_password }}"
