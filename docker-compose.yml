services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - charm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      DEMO_USER_ENABLED: "${DEMO_USER_ENABLED}"
      DEMO_EMAIL: "${DEMO_EMAIL}"
      DEMO_PASSWORD: "${DEMO_PASSWORD}"
      SYNTHETIC_USERS_ENABLED: "${SYNTHETIC_USERS_ENABLED}"
      SYNTHETIC_USERS_COUNT: "${SYNTHETIC_USERS_COUNT}"
      SYNTHETIC_USERS_EMAIL_PREFIX: "${SYNTHETIC_USERS_EMAIL_PREFIX}"
      SYNTHETIC_USERS_PASSWORD: "${SYNTHETIC_USERS_PASSWORD}"
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"" ]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      STREAMLIT_API_URL: "${STREAMLIT_API_URL:?STREAMLIT_API_URL is required}"
    ports:
      - "${STREAMLIT_PORT}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  charm_postgres_data:
