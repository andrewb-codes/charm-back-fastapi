services:
  api:
    build:
      context: .
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-charm}"
      POSTGRES_USER: "${POSTGRES_USER:-charm_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - charm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  charm_postgres_data:
