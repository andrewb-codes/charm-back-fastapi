name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: charm_test
          POSTGRES_USER: charm
          POSTGRES_PASSWORD: charm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U charm -d charm_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_NAME: Charm API Test
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://charm:charm@localhost:5432/charm_test
      JWT_SECRET: test-secret
      JWT_TTL_MINUTES: "60"
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy app

      - name: Run tests
        run: uv run pytest

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}
      APP_IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.APP_IMAGE }}:main

      - name: Set up SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Set up Ansible
        run: python -m pip install ansible

      - name: Create Ansible inventory
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          printf '[charm]\ncharm-vps ansible_host=%s ansible_user=%s\n' "$VPS_HOST" "$VPS_USER" > deploy/ansible/inventory.ini

      - name: Deploy to VPS
        working-directory: deploy/ansible
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ansible-playbook playbook.yml \
            --extra-vars "postgres_password=${POSTGRES_PASSWORD}" \
            --extra-vars "jwt_secret=${JWT_SECRET}" \
            --extra-vars "app_image=${APP_IMAGE}" \
            --extra-vars "app_image_tag=${APP_IMAGE_TAG}"
